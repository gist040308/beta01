<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Atomic Spectrum Visualization</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/chart.js\"></script>\n</head>\n<body>\n    <h1>Atomic Spectrum Visualization</h1>\n    <label for=\"atomicNumber\">Atomic Number (1-92):</label>\n    <input type=\"number\" id=\"atomicNumber\" min=\"1\" max=\"92\" value=\"1\" onchange=\"updateChart()\">\n    <canvas id=\"spectrumChart\"></canvas>\n    <script>\n        function rydbergFormula(n1, n2) {\n            const R = 1.097373e7; // Rydberg constant in m^-1\n            return (R * (1 / (n1 * n1) - 1 / (n2 * n2))).toFixed(2);\n        }\n\n        function calculateSpectralLines(atomicNumber) {\n            const transitions = [];\n            const series = [\n                { name: 'Lyman', n1: 1 },\n                { name: 'Balmer', n1: 2 },\n                { name: 'Paschen', n1: 3 },\n                { name: 'Brackett', n1: 4 },\n                { name: 'Pfund', n1: 5 }\n            ];\n            for (const serie of series) {\n                for (let n2 = serie.n1 + 1; n2 <= 100; n2++) {\n                    const wavelength = rydbergFormula(serie.n1, n2) / atomicNumber;\n                    transitions.push({ wavelength, series: serie.name });\n                }\n            }\n            return transitions;\n        }\n\n        const config = {\n            type: 'scatter',\n            data: {\n                datasets: []\n            },\n            options: {\n                scales: {\n                    x: {\n                        title: {\n                            display: true,\n                            text: 'Wavelength (m)'\n                        }\n                    },\n                    y: {\n                        title: {\n                            display: true,\n                            text: 'Spectral Lines'\n                        }\n                    }\n                },\n                responsive: true,\n                plugins: {\n                    legend: {\n                        display: true\n                    }\n                }\n            }\n        };\n\n        const spectrumChart = new Chart(document.getElementById('spectrumChart'), config);\n\n        function updateChart() {\n            const atomicNumber = parseInt(document.getElementById('atomicNumber').value);\n            const transitions = calculateSpectralLines(atomicNumber);\n            spectrumChart.data.datasets = [];\n            const seriesMap = {};\n            transitions.forEach(({ wavelength, series }) => {\n                if (!seriesMap[series]) {\n                    seriesMap[series] = [];\n                }\n                seriesMap[series].push({ x: wavelength, y: seriesMap[series].length + 1 });\n            });\n            Object.keys(seriesMap).forEach(series => {\n                spectrumChart.data.datasets.push({\n                    label: series,\n                    data: seriesMap[series],\n                    showLine: false,\n                    pointRadius: 5\n                });\n            });\n            spectrumChart.update();\n        }\n    </script>\n</body>\n</html>\n
