<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Spectrum</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <h1>Atomic Spectral Lines</h1>
    <div id="plot"></div>
    <script>
        // Data for atomic spectral lines
        const spectralLines = [
            { wavelength: 656.28, label: "H-alpha" },
            { wavelength: 486.13, label: "H-beta" },
            { wavelength: 434.05, label: "H-gamma" },
            { wavelength: 410.17, label: "H-delta" },
            { wavelength: 397.0, label: "Balmer series" },
            { wavelength: 121.56, label: "Lyman-alpha" },
            { wavelength: 102.57, label: "Lyman-beta" },
            { wavelength: 97.25, label: "Lyman-gamma" }
            // Add more lines as necessary
        ];

        const wavelengths = spectralLines.map(line => line.wavelength);
        const labels = spectralLines.map(line => line.label);

        const trace = {
            x: wavelengths,
            y: Array(wavelengths.length).fill(1),  // Just for visibility
            text: labels,
            mode: 'markers',
            type: 'scatter'
        };

        const layout = {
            title: 'Atomic Spectral Lines',
            xaxis: { title: 'Wavelength (nm)' },
            yaxis: { title: 'Intensity', showgrid: false, zeroline: false, showline: false }
        };

        Plotly.newPlot('plot', [trace], layout);
    </script>
</body>
</html>
